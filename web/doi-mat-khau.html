<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đổi mật khẩu — CSCC</title>
  <link rel="stylesheet" href="css/main.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>

<header class="app-header">
  <div class="logo">⚡ CSCC Đổi mật khẩu</div>
  <div class="user-info">
    <nav class="nav-links hide-mobile">
      <a href="chamcong.html" data-page="chamcong">Chấm công</a>
      <a href="huongdan.html" data-page="huongdan">Hướng dẫn</a>
    </nav>
    <span id="header-name">—</span>
    <span id="header-role" style="opacity:.7;font-size:.8rem;"></span>
    <button class="btn btn-ghost" style="color:#fff;border-color:rgba(255,255,255,.3);padding:.3rem .7rem;font-size:.8rem;"
            onclick="logout()">Đăng xuất</button>
  </div>
</header>

<div class="container" x-data="doiMatKhauApp()" x-init="init()" style="max-width:480px;">

  <div class="card" style="padding:1.5rem;">
    <h2 style="margin:0 0 1rem;font-size:1.1rem;">🔑 Đổi mật khẩu</h2>

    <div x-show="errorMsg"   class="alert alert-error"   x-text="errorMsg"></div>
    <div x-show="successMsg" class="alert alert-success" x-text="successMsg"></div>

    <form @submit.prevent="doiMatKhau()">
      <div class="form-group">
        <label class="form-label">Mật khẩu hiện tại *</label>
        <input class="form-control" type="password" x-model="matKhauCu" autocomplete="current-password">
      </div>
      <div class="form-group">
        <label class="form-label">Mật khẩu mới * (≥ 6 ký tự)</label>
        <input class="form-control" type="password" x-model="matKhauMoi" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Xác nhận mật khẩu mới *</label>
        <input class="form-control" type="password" x-model="xacNhan" autocomplete="new-password">
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%;margin-top:.5rem;" :disabled="submitting">
        <span x-show="submitting" class="spinner"></span>
        <span>Đổi mật khẩu</span>
      </button>
    </form>

    <p style="font-size:.82rem;color:var(--gray-5);margin-top:1rem;">
      Mật khẩu được lưu dạng băm có salt — hệ thống không thể đọc lại mật khẩu gốc.
      Quên mật khẩu? Liên hệ HR/Admin để đặt lại.
    </p>
  </div>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/doimatkhau.js"></script>
</body>
</html>
