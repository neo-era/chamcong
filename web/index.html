<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập — Chấm công CSCC</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card" x-data="loginApp()" x-init="init()">
      <div class="login-logo">⚡ CSCC</div>
      <div style="font-size:1.1rem;font-weight:700;margin-bottom:.25rem;">Hệ thống Chấm công</div>
      <div class="login-sub">Chiếu sáng khu vực Trung tâm</div>

      <form @submit.prevent="doLogin" style="margin-top:1.5rem;">
        <div class="form-group">
          <label for="inp-email">Email</label>
          <input id="inp-email" type="email" x-model="email"
                 placeholder="email@cscc.vn" autocomplete="username"
                 :disabled="loading" required>
        </div>
        <div class="form-group" style="margin-top:.75rem;">
          <label for="inp-mk">Mật khẩu</label>
          <input id="inp-mk" type="password" x-model="matKhau"
                 placeholder="••••••" autocomplete="current-password"
                 :disabled="loading" required>
        </div>

        <div x-show="errorMsg" x-text="errorMsg"
             class="alert alert-danger" style="margin-top:.75rem;"></div>

        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:1rem;"
                :disabled="loading">
          <span x-show="!loading">Đăng nhập</span>
          <span x-show="loading">Đang xác thực…</span>
        </button>
      </form>

      <p style="margin-top:1.25rem;font-size:.78rem;color:var(--gray-5);text-align:center;">
        Tài khoản do HR/Admin cấp.<br>Liên hệ Admin nếu không vào được.
      </p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="vendor/alpine.min.js" defer></script>
  <script>
    function loginApp() {
      return {
        email: '',
        matKhau: '',
        loading: false,
        errorMsg: '',

        init() {
          if (isLoggedIn()) {
            const redirect = sessionStorage.getItem('cc_redirect') || 'chamcong.html';
            sessionStorage.removeItem('cc_redirect');
            window.location.href = redirect;
          }
        },

        async doLogin() {
          this.errorMsg = '';
          this.loading  = true;
          try {
            await login(this.email, this.matKhau);
            const redirect = sessionStorage.getItem('cc_redirect') || 'chamcong.html';
            sessionStorage.removeItem('cc_redirect');
            window.location.href = redirect;
          } catch (e) {
            this.errorMsg = e.message;
          } finally {
            this.loading = false;
          }
        }
      };
    }
  </script>
</body>
</html>
